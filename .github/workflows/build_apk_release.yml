name: Build APK (Release)

on:
  push:
    branches: [master]
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks

      - name: Create key.properties
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=${KEY_STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=../upload-keystore.jks
          EOF

      - name: Set build date
        run: echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Build APK (release)
        run: flutter build apk --release --build-number="${{ env.BUILD_DATE }}"

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk "help_to_learn_${{ env.BUILD_DATE }}.apk"

      - name: Publish to GitHub Release
        run: |
          gh release delete "v${{ env.BUILD_DATE }}" --yes --cleanup-tag 2>/dev/null || true
          sleep 2
          gh release create "v${{ env.BUILD_DATE }}" \
            "help_to_learn_${{ env.BUILD_DATE }}.apk" \
            --title "Release ${{ env.BUILD_DATE }}" \
            --notes "Automated release build from master branch." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
