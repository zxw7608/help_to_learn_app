name: help_to_learn_app
description: "English Learning Material App with AnkiDroid Integration"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  dio: ^5.4.3
  dio_cache_interceptor: ^3.5.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Audio Playback
  just_audio: ^0.9.39

  # Permissions
  permission_handler: ^12.0.0

  # AnkiDroid Integration (native Android API)
  flutter_ankidroid: ^0.8.1

  # Storage & Security
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.3

  # Logging
  logger: ^2.4.0

  # Fonts
  google_fonts: ^6.2.1

  # UI & Utils
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  timeago: ^3.6.1
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  file_picker: ^8.1.2
  intl: ^0.19.0
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
